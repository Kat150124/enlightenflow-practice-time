<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🌱 啟萌培訓團練時間</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🌱 啟萌培訓團練時間</h1>
      <button id="refreshBtn" class="refresh-btn" title="重新整理資料">🔄</button>
    </header>

    <div id="errorBanner" class="error-banner" style="display:none"></div>
    <div id="savingIndicator" class="saving-indicator" style="display:none">⏳ 儲存中…</div>

    <div class="tabs">
      <button id="tabCalendarBtn" class="tab-btn active" onclick="switchTab('calendar')">📅 日曆登記</button>
      <button id="tabMatchBtn" class="tab-btn" onclick="switchTab('match')">🌿 可約時段</button>
      <button id="tabConfirmedBtn" class="tab-btn" onclick="switchTab('confirmed')">🎯 已確認練習</button>
    </div>

    <!-- 日曆登記頁 -->
    <div id="calendarTab" class="tab-content">
      <p id="noPeopleHint" class="hint" style="display:none">尚未設定成員名單，請先到 Google Sheet 的 People 工作表新增。</p>

      <div id="peopleChips" class="chips-row people-row"></div>
      <p id="pickMeHint" class="hint pink" style="display:none">👆 請先選你自己，才能登記時段喔</p>

      <div class="viewmode-row">
        <button class="viewmode-btn active" data-mode="week" onclick="setViewMode('week')">週</button>
        <button class="viewmode-btn" data-mode="twoWeek" onclick="setViewMode('twoWeek')">兩週</button>
        <button class="viewmode-btn" data-mode="month" onclick="setViewMode('month')">月</button>
      </div>

      <div class="nav-row">
        <button class="nav-btn" onclick="goPrev()">‹</button>
        <span id="periodLabel" class="period-label"></span>
        <button class="nav-btn" onclick="goNext()">›</button>
      </div>

      <div id="gridContainer"></div>
      <p class="tip">💡 在格子上點一下或按住拖曳可以選取時間，選完後按下面的「儲存」才會真的存進去。金色 🎯 底色代表已確認的練習時間。</p>
    </div>

    <div id="slotDetailBar" class="slot-detail-popover" style="display:none">
      <button class="slot-detail-close" onclick="closeSlotDetail()">✕</button>
      <div id="slotDetailText"></div>
    </div>

    <div id="pendingBar" class="pending-bar" style="display:none">
      <span id="pendingCount" class="pending-count"></span>
      <div class="pending-actions">
        <button class="btn-text" onclick="discardPendingChanges()">清除</button>
        <button class="btn-primary" onclick="savePendingChanges()">💾 儲存</button>
      </div>
    </div>

    <!-- 可約時段頁 -->
    <div id="matchTab" class="tab-content" style="display:none">
      <div id="matchList"></div>
    </div>

    <!-- 已確認練習頁 -->
    <div id="confirmedTab" class="tab-content" style="display:none">
      <p class="section-title">🎯 已確認的練習</p>
      <div id="confirmedList"></div>
    </div>
  </div>

  <script src="app.js?v=15"></script>
</body>
</html>
