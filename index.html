<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>練習時間配對</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <h1>練習時間配對 <span class="sparkle">✨</span></h1>
        <p class="subtitle">大家的零碎時間，一起湊出練習時段</p>
      </div>
      <button id="refreshBtn" class="refresh-btn" title="重新整理資料">🔄</button>
    </header>

    <div id="errorBanner" class="error-banner" style="display:none"></div>

    <div class="tabs">
      <button id="tabCalendarBtn" class="tab-btn active" onclick="switchTab('calendar')">📅 日曆登記</button>
      <button id="tabMatchBtn" class="tab-btn" onclick="switchTab('match')">✨ 媒合結果</button>
    </div>

    <!-- 日曆登記頁 -->
    <div id="calendarTab" class="tab-content">
      <div class="add-person-row">
        <input id="newNameInput" placeholder="輸入你的名字" />
        <button class="btn-yellow" onclick="handleAddPerson()">＋ 加入</button>
      </div>
      <p id="noPeopleHint" class="hint" style="display:none">還沒有人加入，先在上面輸入名字加入吧！</p>

      <p class="mini-label">點名字選擇「我是誰」，再去日曆上點時段：</p>
      <div id="peopleChips" class="chips-row"></div>
      <p id="pickMeHint" class="hint pink" style="display:none">👆 請先選你自己，才能登記時段喔</p>

      <div class="viewmode-row">
        <button class="viewmode-btn active" data-mode="week" onclick="setViewMode('week')">週</button>
        <button class="viewmode-btn" data-mode="twoWeek" onclick="setViewMode('twoWeek')">兩週</button>
        <button class="viewmode-btn" data-mode="month" onclick="setViewMode('month')">月</button>
      </div>

      <div class="nav-row">
        <button class="nav-btn" onclick="goPrev()">‹</button>
        <span id="periodLabel" class="period-label"></span>
        <button class="nav-btn" onclick="goNext()">›</button>
      </div>

      <div id="gridContainer"></div>
      <p class="tip">💡 點格子切換自己有空／沒空。金色 🎯 底色代表已確認的練習時間。</p>
    </div>

    <!-- 媒合結果頁 -->
    <div id="matchTab" class="tab-content" style="display:none">
      <div class="threshold-row">
        <span class="threshold-label">👥 至少要幾人有空</span>
        <div class="stepper">
          <button onclick="changeThreshold(-1)">−</button>
          <span id="thresholdValue">2</span>
          <button onclick="changeThreshold(1)">＋</button>
        </div>
      </div>

      <div id="matchList"></div>

      <div class="confirmed-section">
        <p class="section-title">🎯 已確認的練習</p>
        <div id="confirmedList"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
